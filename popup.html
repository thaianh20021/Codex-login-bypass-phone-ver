<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Exporter</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 14px;
        color: #e8e8e8;
        background: #202123;
        font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 650;
      }

      button {
        width: 100%;
        min-height: 38px;
        margin-top: 8px;
        border: 0;
        border-radius: 6px;
        color: #fff;
        background: #10a37f;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button.secondary {
        color: #202123;
        background: #ececf1;
      }

      button.ghost {
        border: 1px solid #565869;
        color: #ececf1;
        background: transparent;
      }

      button:disabled {
        cursor: wait;
        opacity: .6;
      }

      label {
        display: block;
        margin-top: 12px;
        color: #c5c5d2;
        font-weight: 650;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: 116px;
        margin-top: 8px;
        padding: 9px;
        border: 1px solid #565869;
        border-radius: 6px;
        color: #ececf1;
        background: #171719;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        resize: vertical;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      #status {
        min-height: 36px;
        margin-top: 10px;
        color: #b7b7b7;
        overflow-wrap: anywhere;
      }

      details {
        margin-top: 10px;
        border-top: 1px solid #343541;
        padding-top: 10px;
      }

      summary {
        cursor: pointer;
        font-weight: 650;
      }

      .donate {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .donate-card {
        border: 1px solid #343541;
        border-radius: 6px;
        padding: 10px;
      }

      .donate-card h2 {
        margin: 0 0 6px;
        font-size: 13px;
      }

      .donate-card p {
        margin: 3px 0;
        color: #c5c5d2;
      }

      .qr {
        display: block;
        width: 100%;
        max-width: 210px;
        margin: 8px auto 0;
        border-radius: 6px;
        background: #fff;
      }

      code {
        color: #ececf1;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <h1>Codex JSON Export</h1>
    <button id="copy-bulkadd">Copy 9router Bulk Add</button>
    <button id="download-bulkadd" class="secondary">Download bulkadd.json</button>
    <button id="download-auth" class="ghost">Download auth.json</button>
    <label for="convert-json">Convert Sub2API / CPA / auth.json</label>
    <textarea id="convert-json" spellcheck="false" placeholder="Paste JSON here"></textarea>
    <div class="button-row">
      <button id="copy-converted" class="secondary">Copy converted</button>
      <button id="download-converted" class="ghost">Download</button>
    </div>
    <div id="status" role="status"></div>
    <details>
      <summary>Buy me a coffee</summary>
      <div class="donate">
        <section class="donate-card">
          <h2>VND bank transfer</h2>
          <p>DANG THAI ANH</p>
          <p>BIDV - PGD Him Lam</p>
          <p><code>3600607858</code></p>
          <img class="qr" src="assets/vnd-vietqr.png" alt="VND VietQR for DANG THAI ANH">
        </section>
        <section class="donate-card">
          <h2>USDT</h2>
          <p>BSC / BEP20</p>
          <p><code>0x363bf8508d2ec456b5e99c923888cc30ce6f91698</code></p>
          <img class="qr" src="assets/usdt-bep20-qr.png" alt="USDT BEP20 QR address">
        </section>
      </div>
    </details>
    <script src="converter.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
